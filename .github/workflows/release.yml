name: Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to build and submit"
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios
      version_bump:
        description: "Marketing version bump"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      profile:
        description: "EAS build/submit profile"
        type: choice
        required: true
        default: production
        options:
          - production
          - preview

# Allow the workflow to push the version bump commit back to main.
permissions:
  contents: write

jobs:
  release:
    name: Build & submit (${{ inputs.platform }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      # Bumps the marketing version in apps/mobile/package.json only.
      # app.config.ts reads its version from package.json, so it stays in sync.
      # The native versionCode (Android) and buildNumber (iOS) are auto-incremented
      # by EAS on every production build (appVersionSource: remote + autoIncrement).
      - name: Bump marketing version
        id: bump
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      # Runs from apps/mobile (default working-directory) so it picks up the
      # bumped version. --no-wait returns immediately; --auto-submit schedules
      # the store submission on EAS once the build finishes.
      - name: Build and submit
        run: >
          eas build
          --platform ${{ inputs.platform }}
          --profile ${{ inputs.profile }}
          --non-interactive
          --auto-submit
          --no-wait

      - name: Commit version bump
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/package.json
          git commit -m "chore(release): bump mobile version to v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
